<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vídeos com HTML5</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
</head>
<body>
    <h1>Inserindo videos hospedados localmente</h1>
    <p>Este védeo está hospedado no meu próprio servidor.</p>
    <video poster="imagens/imagem.png" width="500" controls >
        <source src="midia/video.estudo.webm" type="video/webm">
        <source src="midia/video.estudo.mp4" type="video/mp4">
        <source src="midia/video.estudo.ogv" type="video/ogg">
        <p>Seu navegador não suporta o elemento.</p> 
    </video>
    <h1>Inserindo videos do YouTube</h1>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/gIXhlCdvvGM?si=_GOFl9HbYRnSYJ5V" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

</body>
</html>
